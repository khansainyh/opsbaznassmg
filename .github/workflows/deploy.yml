name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "==== STARTING DEPLOYMENT ===="
            
            echo "0. Loading NVM and Node environment..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Verify node & npm are loaded
            echo "Using Node: $(node -v)"
            echo "Using NPM: $(npm -v)"
            
            cd /var/www/baznas-app
            
            echo "1. Fetching latest code from GitHub..."
            # Try fetching using existing origin config first, fallback to token if needed
            git fetch origin master || git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khansainyh/opsbaznassmg.git master
            git reset --hard FETCH_HEAD
            
            echo "2. Setting up Backend..."
            cd backend
            npm install
            
            echo "3. Migrating Database Roles..."
            node scripts/migrate-roles.js || true
            
            echo "4. Updating Database Schema (Prisma)..."
            npx prisma db push --accept-data-loss
            
            echo "5. Building Backend..."
            npm run build
            
            echo "6. Restarting PM2 Backend Process..."
            pm2 restart baznas-api || pm2 start dist/src/index.js --name "baznas-api"
            
            echo "7. Setting up Frontend..."
            cd ../frontend
            npm install --legacy-peer-deps
            
            echo "8. Building Frontend..."
            npm run build
            
            echo "==== DEPLOYMENT SUCCESSFUL ===="
